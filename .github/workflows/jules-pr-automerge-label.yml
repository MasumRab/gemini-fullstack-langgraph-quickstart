name: Jules PR Auto-Merge Label

# Periodically labels Jules-created PRs for auto-merge.
# Avoids per-session polling which would burn billable action minutes.
# Relies on Mergify (EI, GCPL) or GitHub auto-merge rules to complete the merge.

on:
  schedule:
    - cron: '0 * * * *'  # once per hour
  workflow_dispatch:

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const allPrs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            let labeled = 0;
            const sameRepo = context.repo.owner + '/' + context.repo.repo;
            for (const pr of allPrs) {
              // Only label PRs from the Jules bot account in the same repository.
              // Branch-name matching is rejected as a spoof vector — a fork author
              // controls their branch name and can trivially create a jules-* branch.
              if (pr.user.login === 'jules' && pr.head.repo.full_name === sameRepo) {
                const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                });

                if (!labels.some(l => l.name === 'automerge')) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: ['automerge'],
                  });
                  labeled++;
                }
              }
            }

            core.info(`Labeled ${labeled} Jules PRs with automerge`);
