name: Jules PR Auto-Merge Label

# Periodically labels Jules-created PRs for auto-merge.
# Avoids per-session polling which would burn billable action minutes.
# Relies on Mergify (EI, GCPL) or GitHub auto-merge rules to complete the merge.

on:
  schedule:
    - cron: '0 * * * *'  # once per hour
  workflow_dispatch:

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            let labeled = 0;
            for (const pr of prs) {
              // Label PRs created by Jules or on jules-* branches
              if (pr.user.login === 'jules' || pr.head.ref.startsWith('jules-')) {
                const { data: labels } = await github.rest.issues.listLabelsOnIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                });

                if (!labels.some(l => l.name === 'automerge')) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: ['automerge'],
                  });
                  labeled++;
                }
              }
            }

            core.info(`Labeled ${labeled} Jules PRs with automerge`);
