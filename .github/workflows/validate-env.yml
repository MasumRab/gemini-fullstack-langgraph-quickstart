name: Validate Environment Configuration

on:
  pull_request:
    paths:
      - '.env.example'
      - 'backend/.env.example'
      - 'backend/src/agent/*.py'

jobs:
  validate-env:
    name: Validate environment variables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check .env.example has GEMINI_API_KEY
        run: |
          if ! grep -q "^GEMINI_API_KEY=" .env.example; then
            echo "ERROR: .env.example is missing the required GEMINI_API_KEY entry."
            exit 1
          fi
          echo "✓ GEMINI_API_KEY is documented in .env.example"

      - name: Check backend/.env.example has GEMINI_API_KEY
        run: |
          if ! grep -q "GEMINI_API_KEY" backend/.env.example; then
            echo "ERROR: backend/.env.example is missing GEMINI_API_KEY."
            exit 1
          fi
          echo "✓ GEMINI_API_KEY is documented in backend/.env.example"

      - name: Verify GEMINI_API_KEY is used in agent code
        run: |
          if ! grep -rq "GEMINI_API_KEY" backend/src/agent/; then
            echo "WARNING: GEMINI_API_KEY not found referenced in backend/src/agent/ — verify this is intentional."
          else
            echo "✓ GEMINI_API_KEY is referenced in agent source code"
          fi
