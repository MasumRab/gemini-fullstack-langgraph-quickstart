name: Jules PR Conflict Resolution

# Monitors the source PR for stability before creating a Jules session.
# Watches for new commits via GitHub API (zero Jules sessions consumed),
# waits for 60s of stability, then fetches the latest state.
# If new commits resolve the conflicts organically, no session is created.

on:
  pull_request:
    types: [labeled]

concurrency:
  group: jules-resolve-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  resolve:
    if: github.event.label.name == 'jules-resolve'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Consume label — prevent duplicate sessions
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'jules-resolve',
            }).catch(() => core.info('Label already consumed'));

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Fetch base branch
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF"

      - name: Check for merge conflicts
        id: conflict-check
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git merge-tree --write-tree HEAD "origin/$BASE_REF"
          case $? in
            0) echo "has_conflicts=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "has_conflicts=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "has_conflicts=error" >> "$GITHUB_OUTPUT"; exit 1 ;;
          esac

      - name: No conflicts — notify
        if: steps.conflict-check.outputs.has_conflicts == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '<!-- jules-resolve -->\n✅ No merge conflicts detected.',
            });

      - name: Watch source PR for stability before resolving
        if: steps.conflict-check.outputs.has_conflicts == 'true'
        id: watch
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const MAX_POLLS = 10;
            const STABLE_THRESHOLD = 2;

            let lastSha = context.payload.pull_request.head.sha;
            let stableCount = 0;
            let commentId;

            const makeBody = (sha, status) => [
              '<!-- jules-resolve -->',
              '🔍 **Monitoring source PR for new commits...**',
              'Current SHA: `' + sha + '`',
              'Status: ' + status,
              'Will wait up to 5 minutes for PR to stabilize before resolving.',
            ].join('\n');

            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: makeBody(lastSha, 'Watching...'),
            });
            commentId = comment.id;

            for (let i = 0; i < MAX_POLLS; i++) {
              await new Promise(r => setTimeout(r, 30000));

              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });

              const sha = pr.head.sha;

              if (sha === lastSha) {
                stableCount++;
                core.info('Stable ' + stableCount + '/' + STABLE_THRESHOLD + ' — ' + sha);
                if (stableCount >= STABLE_THRESHOLD) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: commentId,
                    body: makeBody(sha, 'Stable — proceeding.'),
                  });
                  core.setOutput('comment_id', String(commentId));
                  core.setOutput('head_sha', sha);
                  return;
                }
              } else {
                core.info('SHA changed: ' + lastSha + ' → ' + sha);
                lastSha = sha;
                stableCount = 0;
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: commentId,
                  body: makeBody(sha, 'New commit at poll ' + (i + 1) + '/' + MAX_POLLS + ' — resetting stability timer.'),
                });
              }
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: makeBody(lastSha, 'Watch timed out (' + (MAX_POLLS * 30) + 's) — proceeding with latest SHA.'),
            });
            core.setOutput('comment_id', String(commentId));
            core.setOutput('head_sha', lastSha);

      - name: Fetch latest and re-check conflicts
        if: steps.conflict-check.outputs.has_conflicts == 'true'
        id: recheck
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$HEAD_REF"
          git reset --hard "origin/$HEAD_REF"
          git fetch origin "$BASE_REF"

          git merge-tree --write-tree HEAD "origin/$BASE_REF"
          case $? in
            0) echo "has_conflicts=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "has_conflicts=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "has_conflicts=error" >> "$GITHUB_OUTPUT"; exit 1 ;;
          esac

      - name: Conflicts resolved — no session needed
        if: steps.recheck.outputs.has_conflicts == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = Number('${{ steps.watch.outputs.comment_id }}');
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: [
                '<!-- jules-resolve -->',
                '✅ **Conflicts resolved by new commits.**',
                'New pushes to the source branch resolved the conflicts organically.',
                'No Jules session was created.',
              ].join('\n'),
            });

      - name: Build payload with full PR context
        if: steps.recheck.outputs.has_conflicts == 'true'
        id: build
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const baseRef = pr.base.ref;
            const headRef = pr.head.ref;
            const headSha = '${{ steps.watch.outputs.head_sha }}';

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const fileSummary = files.map(f => ({
              path: f.filename, status: f.status,
              additions: f.additions, deletions: f.deletions,
            }));

            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });
            const { data: issueComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });

            const skipMarkers = ['<!-- jules-pr-reviewer -->', '<!-- jules-auto-fix -->', '<!-- jules-resolve -->'];
            const priorFeedback = issueComments
              .filter(c => !skipMarkers.some(m => c.body?.includes(m)))
              .slice(0, 10)
              .map(c => {
                const who = c.user?.type === 'User' ? c.user.login : '[' + c.user?.login + ']';
                return who + ': ' + (c.body?.slice(0, 300) || '');
              })
              .join('\n\n');

            const priorReviews = reviewComments
              .slice(0, 10)
              .map(c => '- ' + c.path + ':' + c.line + ' — ' + (c.body.slice(0, 300) || ''))
              .join('\n');

            // Load repo-specific instructions if present
            let reviewRules = '';
            for (const path of ['.jules/INSTRUCTIONS.md', '.github/jules-review-rules.md']) {
              try {
                if (fs.existsSync(path)) {
                  reviewRules = fs.readFileSync(path, 'utf8');
                  break;
                }
              } catch (e) { /* file is optional */ }
            }

            const prompt = [
              '## PR Conflict Resolution',
              '',
              'Repository: ' + context.repo.owner + '/' + context.repo.repo,
              'Title: ' + pr.title,
              'Source branch (has conflicts): ' + headRef,
              'Target branch (current): ' + baseRef,
              'Source SHA at resolution start: ' + headSha,
              'Files changed: ' + files.length + ' (' + files.reduce((s, f) => s + f.additions + f.deletions, 0) + ' +/-)',
              '',
              '## Changed files',
              JSON.stringify(fileSummary, null, 2),
              ...(priorFeedback ? ['', '## Existing PR discussion', priorFeedback] : []),
              ...(priorReviews ? ['', '## Existing review comments', priorReviews] : []),
              ...(reviewRules ? ['', '## Repository-specific instructions', reviewRules] : []),
              '',
              '## Your task',
              'You will re-implement changes and create a new PR targeting ' + baseRef + '.',
              'The source branch ' + headRef + ' (SHA: ' + headSha + ') has conflicts with the current state of ' + baseRef + '.',
              '1. Checkout ' + baseRef,
              '2. Review each changed file — understand what the PR intended to change',
              '3. Re-implement those changes on top of current ' + baseRef,
              '4. If the intent is unclear from the diff, check the existing comments above',
              '5. If a change was intentionally obsoleted by later base changes, skip it',
              '6. After making and committing the fix locally, check for late-arriving commits:',
              '   run `git fetch origin ' + headRef + ' && git log --oneline HEAD..origin/' + headRef + '`',
              '   If new commits arrived: `git rebase origin/' + headRef + '`, resolve any new conflicts,',
              '   verify the re-implementation still holds, and amend if needed.',
              '7. When creating the new PR:',
              '   - Reference the original PR in the description: "Resolves conflicts from #' + pr.number + '"',
              '   - Include a clear description of the merged changes',
              '   - Ensure CI checks pass',
              '',
              'Use `git diff ' + baseRef + '...origin/' + headRef + ' -- <filepath>` to inspect original PR intent.',
              'The repo is cloned in your sandbox with full history.',
            ].join('\n');

            const fs = require('fs');
            const payload = {
              prompt,
              sourceContext: {
                source: 'sources/github/' + context.repo.owner + '/' + context.repo.repo,
                githubRepoContext: { startingBranch: baseRef },
              },
              automationMode: 'AUTO_CREATE_PR',
            };
            fs.writeFileSync('/tmp/jules-resolve-payload.json', JSON.stringify(payload));
            core.setOutput('head_sha', headSha);
            core.info('Payload written — source SHA: ' + headSha);

      - name: Create Jules session
        if: steps.recheck.outputs.has_conflicts == 'true'
        id: create
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          RESPONSE=$(curl -sS --fail-with-body -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${JULES_API_KEY}" \
            -d @/tmp/jules-resolve-payload.json)

          SESSION_NAME=$(echo "$RESPONSE" | jq -r '.name // empty')
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$SESSION_NAME" ] && [ -z "$SESSION_ID" ]; then
            echo "Error: $RESPONSE"
            exit 1
          fi
          echo "session_name=$SESSION_NAME" >> "$GITHUB_OUTPUT"
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "Session created: ${SESSION_NAME:-sessions/${SESSION_ID}}"

      - name: Update resolution notice with session info
        if: steps.recheck.outputs.has_conflicts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = Number('${{ steps.watch.outputs.comment_id }}');
            const sessionId = '${{ steps.create.outputs.session_id }}';
            const headSha = '${{ steps.build.outputs.head_sha }}';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: [
                '<!-- jules-resolve -->',
                '🔄 **Jules is resolving conflicts.**',
                'Source SHA: `' + headSha + '`',
                'Session: `' + sessionId + '`',
                'A new PR with resolved changes will be created when complete.',
              ].join('\n'),
            });
