name: Jules PR Force Review

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    if: github.event.label.name == 'jules-force-review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Jules PR Review
        uses: sanjay3290/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_drafts: true
          skip_forks: true
          bypass_label: jules-override
          status_context: jules/review
          fail_on: blocking
          timeout_minutes: 45

      - name: Remove jules-force-review label
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: 'jules-force-review',
            });
