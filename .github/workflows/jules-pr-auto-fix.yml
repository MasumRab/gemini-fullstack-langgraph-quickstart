name: Jules Auto-Fix

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: jules-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  fix:
    if: >
      github.event.label.name == 'jules-fix' ||
      (github.event_name == 'issue_comment' &&
       startsWith(github.event.comment.body, '/jules-fix'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Consume label — prevent duplicate sessions
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'jules-fix',
            }).catch(() => core.info('Label already consumed'));
      - name: Parse slash command context
        if: github.event_name == 'issue_comment'
        id: parse
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          CUSTOM=$(echo "$COMMENT_BODY" | sed 's|^/jules-fix ||')
          echo "custom_instructions=$CUSTOM" >> "$GITHUB_OUTPUT"

      - name: Fork check
        id: fork-check
        shell: bash
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
        run: |
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.fork-check.outputs.skip != 'true'
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Prepare prompt and payload
        id: prepare
        env:
          CUSTOM_INSTRUCTIONS: ${{ steps.parse.outputs.custom_instructions }}
        uses: actions/github-script@v7
        with:
          script: |
            if ('${{ steps.fork-check.outputs.skip }}' === 'true') {
              core.setOutput('skip', 'true');
              return;
            }

            const pr = context.payload.pull_request;
            const baseRef = pr.base.ref;
            const headRef = pr.head.ref;
            const headSha = pr.head.sha;
            const body = pr.body || '';

            const match = body.match(/^Target:\s*(\S+)/m);
            const target = (match ? match[1] : baseRef);

            if (match && target !== baseRef) {
              core.warning(`PR body says "${target}" but PR targets "${baseRef}"`);
            }

            // Fetch changed file list (names only)
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const fileSummary = files.map(f => ({
              path: f.filename, status: f.status,
              additions: f.additions, deletions: f.deletions,
            }));
            const fileCount = files.length;
            const totalChanges = files.reduce((s, f) => s + f.additions + f.deletions, 0);

            if (totalChanges > 2000) {
              core.warning(`Large diff (${totalChanges} lines) — instructing selective git diff`);
            }

            // Fetch existing PR comments (newest-first, capped)
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });
            const allIssueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const issueComments = allIssueComments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Priority 1: review comments (line-level, actionable) — newest 10
            const priorReviews = reviewComments
              .slice(0, 10)
              .map(c => `- ${c.path}:${c.line} — ${c.body.slice(0, 300)}`)
              .join('\n');

            // Priority 2: issue comments — include humans + walkthroughs, skip circular reviews
            const skipMarkers = ['<!-- jules-pr-reviewer -->', '<!-- jules-auto-fix -->', '<!-- jules-resolve -->'];
            const priorFeedback = issueComments
              .filter(c => !skipMarkers.some(m => c.body?.includes(m)))
              .slice(0, 10)
              .map(c => {
                const who = c.user?.type === 'User' ? c.user.login : `[${c.user?.login}]`;
                return `${who}: ${c.body?.slice(0, 300)}`;
              })
              .join('\n\n');

            // Load repo-specific instructions from base branch (trusted)
            let reviewRules = '';
            for (const path of ['.jules/INSTRUCTIONS.md', '.github/jules-review-rules.md']) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path, ref: baseRef,
                });
                reviewRules = Buffer.from(data.content, 'base64').toString('utf8');
                break;
              } catch (e) { /* file is optional */ }
            }

            const fs = require('fs');

            const customInstr = process.env.CUSTOM_INSTRUCTIONS || '';
            let prompt = [
              ...(customInstr ? [`## User instructions`, customInstr, ``] : []),
              `Fix the issue described in this PR. You will create a new PR with the fix.`,
              ...(reviewRules ? [``, `## Repository-specific instructions`, reviewRules] : []),
              ``,
              `## ${pr.title}`,
              ``,
              body,
              ``,
              `---`,
              `Repository: ${context.repo.owner}/${context.repo.repo}`,
              `Target branch: ${target}`,
              `PR head branch: ${headRef}`,
              `PR head SHA: ${headSha}`,
              `Files changed: ${fileCount} (${totalChanges} +/-)`,
              ``,
              `## Changed files (names only, no content)`,
              JSON.stringify(fileSummary, null, 2),
              ``,
              ...(priorFeedback ? [
                `## Existing PR comments`,
                priorFeedback,
                ``,
              ] : []),
              ...(priorReviews ? [
                `## Existing review comments`,
                priorReviews,
                ``,
              ] : []),
              `## Strategy`,
              `The repo is cloned in your sandbox with the PR head branch (${headRef}) checked out.`,
              `The goal is to apply the requested fix on top of the existing PR code, not rewrite it.`,
              `Do NOT request the full diff at once.`,
              `1. Review the file list above — identify relevant files`,
              `2. Read existing PR/review comments above — build on prior context`,
              `3. Run: git diff origin/${target}...HEAD -- <filepath>`,

              `4. Process files one at a time`,
              `5. Only diff files actually needed for the fix`,
               `6. After making and committing the fix locally, check for late commits:`,
               `   run \`git fetch origin ${target} && git log --oneline HEAD..origin/${target}\``,
               `   If new commits arrived: \`git rebase origin/${target}\`, resolve new conflicts,`,
               `   verify the fix still works, and amend if needed.`,
             ].join('\n');

            const prCreateCmd = [
              '7. Create a new PR with gh (no AUTO_CREATE_PR — you do it):',
              '   - Push your branch: git push origin HEAD',
              '   - Then run:',
              '     gh pr create \\',
              `       --base ${target} \\`,
              `       --head "$(git rev-parse --abbrev-ref HEAD)" \\`,
              `       --title "fix: ${pr.title.replace(/"/g, '\\"')}" \\`,
              `       --body "Fixes #${pr.number}\n\n[Describe the fix]" \\`,
              `       --label jules-auto-fix`,
              '   - Verify the label was applied: gh pr view --json labels',
              '   - Ensure CI checks pass',
            ].join('\n');

            prompt += '\n\n' + prCreateCmd;

            const payload = {
              prompt,
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: { startingBranch: headRef },
              },
            };

            // Write payload to file for the curl step
            fs.writeFileSync('/tmp/jules-payload.json', JSON.stringify(payload));
            core.setOutput('target_branch', target);
            core.info(`Payload written to /tmp/jules-payload.json`);

      - name: Invoke Jules via API
        id: create
        if: steps.prepare.outputs.skip != 'true'
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          set +e
          RESPONSE=$(curl -sS --fail-with-body --connect-timeout 10 --max-time 60 -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${JULES_API_KEY}" \
            -d @/tmp/jules-payload.json)
          CURL_EXIT=$?
          set -e

          if [ $CURL_EXIT -ne 0 ]; then
            ERROR_CODE=$(echo "$RESPONSE" | jq -r '.error.code // "0"')
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // ""')
            if [ "$ERROR_CODE" = "429" ] || [ "$ERROR_CODE" = "403" ] || echo "$ERROR_MSG" | grep -qiE 'quota|limit|exceeded|capacity|daily'; then
              echo "quota_exhausted=true" >> "$GITHUB_OUTPUT"
              echo "⚠️ Session cap reached — no session created."
              exit 0
            fi
            echo "Error: $RESPONSE"
            exit 1
          fi

          SESSION_NAME=$(echo "$RESPONSE" | jq -r '.name // empty')
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

          if [ -z "$SESSION_NAME" ] && [ -z "$SESSION_ID" ]; then
            echo "Error: $RESPONSE"
            exit 1
          fi

          echo "Session created: ${SESSION_NAME:-sessions/${SESSION_ID}}"

      - name: Notify session cap reached
        if: steps.create.outputs.quota_exhausted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⚠️ **Jules session cap reached (15/day).**\n\nAuto-fix cannot run today. Re-apply the `jules-fix` label tomorrow to retry.\n\n<!-- jules-quota-exhausted -->',
            });

      - name: Skip (fork)
        if: steps.prepare.outputs.skip == 'true'
        shell: bash
        run: echo "Skipped — fork PR (no secret access)"
