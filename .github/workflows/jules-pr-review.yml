name: Jules PR Review

# Custom reviewer: replaces community action with file-list-first diff strategy
# to avoid 80KB truncation. Reads existing PR comments for context. Sets
# jules/review commit status based on parsed verdict (block → failure).
#
# Output format expected from Jules:
#   ## Summary
#   ## Strengths
#   ## Findings
#     ### [BLOCKING] - path:line — desc
#     ### [WARN] - path:line — desc
#     ### [NIT] - path:line — desc
#   ## Verdict
#   VERDICT: approve | comment | block
#
# To skip review on this PR, add the label "jules-override".

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: jules-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'jules-') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare review prompt
        id: prepare
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const baseRef = pr.base.ref;
            const headSha = pr.head.sha;
            const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;

            // Skip forks — no secret access
            if (isFork) {
              core.setOutput('skip', 'true');
              return;
            }

            // Check bypass label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            if (labels.some(l => l.name === 'jules-override')) {
              core.setOutput('skip', 'true');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const fileSummary = files.map(f => ({
              path: f.filename, status: f.status,
              additions: f.additions, deletions: f.deletions,
            }));

            // Fetch existing comments
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });
            const { data: issueComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });

            const skipMarkers = ['<!-- jules-pr-reviewer -->', '<!-- jules-auto-fix -->', '<!-- jules-resolve -->', '<!-- jules-walkthrough -->'];
            const priorFeedback = issueComments
              .filter(c => !skipMarkers.some(m => c.body?.includes(m)))
              .slice(0, 10)
              .map(c => {
                const who = c.user?.type === 'User' ? c.user.login : `[${c.user?.login}]`;
                return `${who}: ${c.body?.slice(0, 300)}`;
              })
              .join('\n\n');

            const priorReviews = reviewComments
              .slice(0, 10)
              .map(c => `- ${c.path}:${c.line} — ${c.body.slice(0, 300)}`)
              .join('\n');

             // Load repo-specific instructions if present
            const fs = require('fs');
            let reviewRules = '';
            for (const path of ['.jules/INSTRUCTIONS.md', '.github/jules-review-rules.md']) {
              try {
                if (fs.existsSync(path)) {
                  reviewRules = fs.readFileSync(path, 'utf8');
                  break;
                }
              } catch (e) { /* file is optional */ }
            }

            const prompt = [
              `## Code Review Request`,
              ``,
              `Repository: ${context.repo.owner}/${context.repo.repo}`,
              `Title: ${pr.title}`,
              `Target branch: ${baseRef}`,
              `PR head branch: ${pr.head.ref}`,
              `PR head SHA: ${headSha}`,
              `Files changed: ${files.length} (${files.reduce((s, f) => s + f.additions + f.deletions, 0)} +/-)`,
              ``,
              `## Changed files (names only — no content)`,
              JSON.stringify(fileSummary, null, 2),
              ...(priorFeedback ? [``, `## Existing PR comments`, priorFeedback] : []),
              ...(priorReviews ? [``, `## Existing review comments`, priorReviews] : []),
              ...(reviewRules ? [``, `## Repository-specific review rules`, reviewRules] : []),
              ``,
              `## Your task`,
              `Review the code changes using the file-list-first approach:`,
              `1. Review the file list above — identify relevant files`,
              `2. For each relevant file, run: git diff origin/${baseRef}...HEAD -- <filepath>`,
              `3. Read existing PR/review comments above — build on prior context`,
              `4. Examine logic, security, edge cases, and consistency`,
              ``,
              `## Output format`,
              `Produce a review with these sections. Each finding must be wrapped in XML`,
              `tags for machine parsing. The overall review must end with a REVIEW block`,
              `containing a meta-prompt for batch implementation.`,
              ``,
              `## Summary`,
              `(1-2 paragraphs — what this PR does and whether it's sound)`,
              ``,
              `## Strengths`,
              `- What's done well (point form)`,
              ``,
              `## Findings`,
              `Wrap each finding in a FINDING block. Syntax:`,
              ``,
              '<FINDING severity="critical|high|medium|low" file="path/to/file.py" line="42">',
              ``,
              `### 🔴 Critical - path/file.ext:line — description`,
              `(1-2 sentences explaining the issue. If a code change is suggested, add):`,
              '````',
              "```suggestion",
              "<replacement code>",
              '```',
              '````',
              ``,
              '<details>',
              '<summary><ai-prompt reason="security|correctness|performance|style">🤖 AI reasoning</ai-prompt></summary>',
              ``,
              `Brief explanation of the logic/reasoning that produced this finding.`,
              `This helps agents understand the thought process behind the suggestion.`,
              ``,
              '</details>',
              `</FINDING>`,
              ``,
              `Repeat for each severity level — always wrap each in FINDING tags:`,
              `### 🔴 Critical — must fix before merge`,
              `### 🟠 High — should fix before merge`,
              `### 🟡 Medium — deviation from best practices, consider fixing`,
              `### 🟢 Low — minor, stylistic, typos, author's discretion`,
              ``,
              `## Verdict`,
              `<VERDICT>approve | comment | block</VERDICT>`,
              ``,
              `<REVIEW>`,

              `<meta-prompt implementation="batch">`,
              `Describe what this entire review addressed (e.g., "Found 3 security issues`,
              `in auth module and 2 performance issues in data pipeline.")`,
              `This meta-prompt is consumed by agents to implement all fixes in batch.`,
              `To implement all changes: apply the jules-fix label to create a PR with all fixes.`,
              `</meta-prompt>`,
              `</REVIEW>`,
            ].join('\n');

            const payload = {
              prompt,
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: { startingBranch: pr.head.ref },
              },
            };

            const fs = require('fs');
            fs.writeFileSync('/tmp/jules-review-payload.json', JSON.stringify(payload));
            core.setOutput('head_sha', headSha);
            core.info(`Payload written for PR #${pr.number}`);

      - name: Skip (fork or bypass label)
        if: steps.prepare.outputs.skip == 'true'
        shell: bash
        run: echo "Skipped — fork PR or jules-override label present"

      - name: Create Jules session
        if: steps.prepare.outputs.skip != 'true'
        id: create
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          RESPONSE=$(curl -sS --fail-with-body -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${JULES_API_KEY}" \
            -d @/tmp/jules-review-payload.json)

          SESSION_NAME=$(echo "$RESPONSE" | jq -r '.name // empty')
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          STATE=$(echo "$RESPONSE" | jq -r '.state // empty')

          if [ -z "$SESSION_NAME" ] && [ -z "$SESSION_ID" ]; then
            echo "Error: $RESPONSE"
            exit 1
          fi

          echo "session_name=$SESSION_NAME" >> "$GITHUB_OUTPUT"
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "Session created: $SESSION_NAME (state: $STATE)"

      - name: Poll for completion
        if: steps.prepare.outputs.skip != 'true'
        id: poll
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          SESSION_NAME: ${{ steps.create.outputs.session_name }}
          SESSION_ID: ${{ steps.create.outputs.session_id }}
        run: |
          SESSION_RESOURCE="${SESSION_NAME:-sessions/${SESSION_ID}}"
          MAX_ATTEMPTS=60

          for i in $(seq 1 $MAX_ATTEMPTS); do
            sleep 15
            RESPONSE=$(curl -sS --fail-with-body --connect-timeout 10 --max-time 60 \
              "https://jules.googleapis.com/v1alpha/${SESSION_RESOURCE}?view=FULL" \
              -H "X-Goog-Api-Key: ${JULES_API_KEY}")
            STATE=$(echo "$RESPONSE" | jq -r '.state // "UNKNOWN"')

            if [ "$STATE" = "COMPLETED" ] || [ "$STATE" = "FAILED" ]; then
              echo "session_state=$STATE" >> "$GITHUB_OUTPUT"
              ACTS=$(curl -sS --fail-with-body --connect-timeout 10 --max-time 60 \
                "https://jules.googleapis.com/v1alpha/${SESSION_RESOURCE}/activities?pageSize=100" \
                -H "X-Goog-Api-Key: ${JULES_API_KEY}")
              echo "$ACTS" | jq -r '[.activities[] | select(.agentMessaged.agentMessage != null)][-1].agentMessaged.agentMessage // "Review unavailable"' > /tmp/jules-review-output.txt
              echo "Session finished ($STATE)"
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS — state: $STATE"
          done

          echo "session_state=TIMEOUT" >> "$GITHUB_OUTPUT"
          echo "Review timed out after $((MAX_ATTEMPTS * 15)) seconds." > /tmp/jules-review-output.txt

      - name: Post review and set commit status
        if: steps.prepare.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('/tmp/jules-review-output.txt', 'utf8');
            const prNumber = context.payload.pull_request.number;
            const headSha = '${{ steps.prepare.outputs.head_sha }}';
            const sessionState = '${{ steps.poll.outputs.session_state }}';

            // Parse verdict from structured output
            const verdictMatch = reviewText.match(/<VERDICT>\s*(approve|comment|block)\s*<\/VERDICT>/i);
            const verdict = verdictMatch ? verdictMatch[1].toLowerCase() : null;

            // Determine commit status — fail closed
            let statusState = 'failure';
            let statusDesc = 'Review failed';
            if (sessionState === 'COMPLETED' && verdict === 'approve') {
              statusState = 'success';
              statusDesc = 'Approved';
            } else if (sessionState === 'COMPLETED' && verdict === 'comment') {
              statusState = 'success';
              statusDesc = 'Comments provided';
            } else if (sessionState === 'COMPLETED' && verdict === 'block') {
              statusState = 'failure';
              statusDesc = 'Blocking issues found';
            } else if (sessionState === 'FAILED') {
              statusState = 'failure';
              statusDesc = 'Jules session failed';
            } else if (sessionState === 'TIMEOUT') {
              statusState = 'failure';
              statusDesc = 'Review timed out';
            }

            // Set jules/review commit status
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: headSha,
                state: statusState,
                context: 'jules/review',
                description: statusDesc,
              });
            } catch (e) {
              core.warning(`Failed to set commit status: ${e.message}`);
            }

            // Post PR review as a pull request review (not issue comment)
            const body = `<!-- jules-pr-reviewer -->\n\n${reviewText}`;

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: headSha,
                event: 'COMMENT',
                body,
              });
              core.info('Review posted as PR review');
            } catch (e) {
              core.warning(`PR review failed, falling back to issue comment: ${e.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
