name: Jules PR Review

# Custom reviewer: replaces community action with file-list-first diff strategy
# to avoid 80KB truncation. Reads existing PR comments for context. Sets
# jules/review commit status based on parsed verdict (block → failure).
#
# Output format expected from Jules:
#   ## Summary
#   ## Strengths
#   ## Findings
#     ### [BLOCKING] - path:line — desc
#     ### [WARN] - path:line — desc
#     ### [NIT] - path:line — desc
#   ## Verdict
#   VERDICT: approve | comment | block
#
# To skip review on this PR, add the label "jules-override".

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: jules-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'jules-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - name: Fork check
        id: fork-check
        shell: bash
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
        run: |
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.fork-check.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Prepare review prompt
        id: prepare
        uses: actions/github-script@v7
        with:
          script: |
            // Propagate fork skip from the fork-check step
            if ('${{ steps.fork-check.outputs.skip }}' === 'true') {
              core.setOutput('skip', 'true');
              return;
            }

            const pr = context.payload.pull_request;
            const baseRef = pr.base.ref;
            const headSha = pr.head.sha;

            // Check bypass label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            if (labels.some(l => l.name === 'jules-override')) {
              core.setOutput('skip', 'true');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const fileSummary = files.map(f => ({
              path: f.filename, status: f.status,
              additions: f.additions, deletions: f.deletions,
            }));

            // Fetch existing comments
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });
            const allIssueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const issueComments = allIssueComments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const skipMarkers = ['<!-- jules-pr-reviewer -->', '<!-- jules-auto-fix -->', '<!-- jules-resolve -->', '<!-- jules-walkthrough -->'];
            const priorFeedback = issueComments
              .filter(c => !skipMarkers.some(m => c.body?.includes(m)))
              .slice(0, 10)
              .map(c => {
                const who = c.user?.type === 'User' ? c.user.login : `[${c.user?.login}]`;
                return `${who}: ${c.body?.slice(0, 300)}`;
              })
              .join('\n\n');

            const priorReviews = reviewComments
              .slice(0, 10)
              .map(c => `- ${c.path}:${c.line} — ${c.body.slice(0, 300)}`)
              .join('\n');

             // Load repo-specific instructions from base branch (trusted)
            let reviewRules = '';
            for (const path of ['.jules/INSTRUCTIONS.md', '.github/jules-review-rules.md']) {
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path, ref: baseRef,
                });
                reviewRules = Buffer.from(data.content, 'base64').toString('utf8');
                break;
              } catch (e) { /* file is optional */ }
            }

            // Check for existing walkthrough/summary from any tool
            const walkthroughMarkers = [
              '<!-- jules-walkthrough -->',
              '<!-- walkthrough_start -->',
              '<!-- This is an auto-generated comment: summarize by',
              'sourcery-ai',
              '## Review Guide',
            ];
            const hasWalkthrough = issueComments.some(c =>
              walkthroughMarkers.some(m => c.body?.includes(m))
            ) || reviewComments.some(c =>
              walkthroughMarkers.some(m => c.body?.includes(m))
            );

            // Linked issue analysis
            let linkedIssue = '';
            const issueMatch = pr.body?.match(/(?:Fixes|Closes|Resolves|Fix|Close|Resolve)\s+#(\d+)/i);
            if (issueMatch) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(issueMatch[1]),
                });
                linkedIssue = `## Linked Issue\n\n#${issue.number}: ${issue.title}\n${issue.body?.slice(0, 1000) || ''}`;
              } catch (e) { /* issue may be private or deleted */ }
            }

            const prompt = [
              `## Code Review Request`,
              ``,
              `Repository: ${context.repo.owner}/${context.repo.repo}`,
              `Title: ${pr.title}`,
              `Target branch: ${baseRef}`,
              `PR head branch: ${pr.head.ref}`,
              `PR head SHA: ${headSha}`,
              `Files changed: ${files.length} (${files.reduce((s, f) => s + f.additions + f.deletions, 0)} +/-)`,
              ``,
              `## Changed files (names only — no content)`,
              JSON.stringify(fileSummary, null, 2),
              ...(priorFeedback ? [``, `## Existing PR comments`, priorFeedback] : []),
              ...(priorReviews ? [``, `## Existing review comments`, priorReviews] : []),
              ...(reviewRules ? [``, `## Repository-specific review rules`, reviewRules] : []),
              ...(linkedIssue ? [``, linkedIssue] : []),
              ``,
              `## Your task`,
              `This is a read-only code review. Do NOT create any pull requests or modify code.`,
              `Review the code changes using the file-list-first approach:`,
              `1. Review the file list above — identify relevant files`,
              `2. Group them by directory or thematic area (e.g., API, Database, Frontend)`,
              `3. For each relevant file, run: git diff origin/${baseRef}...HEAD -- <filepath>`,
              `4. Read existing PR/review comments above — build on prior context`,
              `5. If a linked issue is provided, assess whether this PR addresses it`,
              `6. Run security analysis using pre-installed tools:`,
              `   - Python: \`ruff check --select ALL .\` (ruff is pre-installed)`,
              `   - JavaScript: \`eslint .\` (eslint is pre-installed)`,
              `   - Include any security findings classified by severity`,
              `7. Examine logic, edge cases, and consistency`,
              ...(hasWalkthrough ? [] : [
                ``,
                `## Bonus: PR Walkthrough`,
                `No walkthrough exists for this PR. After completing the review above,`,
                `add a walkthrough section after the REVIEW block. Include:`,
                `1. **Narrative summary** — what changed and why (2-3 paragraphs)`,
                `2. **Key architectural decisions** — why this approach was chosen`,
                `3. **Diagrams** — \`\`\`mermaid blocks where applicable`,
                `4. **Thematic groupings** — group changed files by area`,
                `Separate the walkthrough from the review with:`,
                `<!-- walkthrough_start -->`,
                `## Walkthrough`,
                `(walkthrough content here)`,
                `<!-- walkthrough_end -->`,
              ]),
              ``,
              `## Output format`,
              `Produce the review EXACTLY in this structure. Keep every element shown below`,
              `including HTML comments and XML-like tags — they are required for parsing.`,
              `Replace placeholders (e.g. <description>) with your analysis.`,
              ``,
              '## Summary',
              '<1-2 paragraphs — what this PR does and whether it is sound>',
              '',
              '## Strengths',
              '- <point form: what is done well>',
              '',
              '## Findings',
              'If no issues found, write: "No significant findings."',
              '',
              '### 🔴 Critical - <path/file.ext:line> — <description>',
              '<MUST fix before merge — production failure, security breach, data corruption. If suggestion:>',
              '````',
              '```suggestion',
              '<replacement code>',
              '```',
              '````',
              '<details>',
              '<summary>🤖 AI reasoning</summary>',
              '<brief explanation of the logic that produced this finding>',
              '</details>',
              '<!-- FINDING severity="critical" file="src/auth.py" line="42" reason="security" -->',
              '',
              '### 🟠 High - <path/file.ext:line> — <description>',
              '<should fix — significant problems, bugs, performance degradation. If suggestion:>',
              '````',
              '```suggestion',
              '<code>',
              '```',
              '````',
              '<details><summary>🤖 AI reasoning</summary><explanation></details>',
              '<!-- FINDING severity="high" file="..." line="..." reason="..." -->',
              '',
              '### 🟡 Medium - <path/file.ext:line> — <description>',
              '<deviation from best practices, technical debt. Consider fixing.>',
              '<!-- FINDING severity="medium" file="..." line="..." -->',
              '',
              '### 🟢 Low - <path/file.ext:line> — <description>',
              '<minor, stylistic, typos, docs. Author discretion.>',
              '<!-- FINDING severity="low" file="..." line="..." -->',
              '',
              '## Truncation',
              'If nearing timeout or output exceeds length limits, truncate gracefully.',
              'Summarize remaining issues. Set verdict block if critical remain, comment if minor.',
              'Add: <!-- meta-prompt: truncated due to limits -->',
              '',
              '## Verdict',
              '[VERDICT]: approve',
              '',
              '<!-- verdict: approve | comment | block -->',
              '',
              '<details>',
              '<summary>🤖 Prompt for AI Agents — implement all per-line changes</summary>',
              '',
              'This PR review identified findings that need to be addressed.',
              'Each per-line comment above includes a specific issue with a code suggestion.',
              'To implement all changes:',
              '1. Read each per-line comment with its ```suggestion block',
              '2. Apply each suggestion at the specified file and line',
              '3. Verify no regressions are introduced',
              '4. Commit and push the fixes',
              '',
              'Or apply the jules-fix label to this PR for an automated fix PR.',
              '',
              '</details>',
            ].join('\n');

            const payload = {
              prompt,
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: { startingBranch: pr.head.ref },
              },
            };

            fs.writeFileSync('/tmp/jules-review-payload.json', JSON.stringify(payload));
            core.setOutput('head_sha', headSha);
            core.info(`Payload written for PR #${pr.number}`);

      - name: Skip (fork or bypass label)
        if: steps.prepare.outputs.skip == 'true'
        shell: bash
        run: echo "Skipped — fork PR or jules-override label present"

      - name: Create Jules session
        if: steps.prepare.outputs.skip != 'true'
        id: create
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          set +e
          RESPONSE=$(curl -sS --fail-with-body --connect-timeout 10 --max-time 60 -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${JULES_API_KEY}" \
            -d @/tmp/jules-review-payload.json)
          CURL_EXIT=$?
          set -e

          if [ $CURL_EXIT -ne 0 ]; then
            ERROR_CODE=$(echo "$RESPONSE" | jq -r '.error.code // "0"')
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // ""')
            if [ "$ERROR_CODE" = "429" ] || [ "$ERROR_CODE" = "403" ] || echo "$ERROR_MSG" | grep -qiE 'quota|limit|exceeded|capacity|daily'; then
              echo "quota_exhausted=true" >> "$GITHUB_OUTPUT"
              echo "⚠️ Session cap reached — no session created."
              exit 0
            fi
            echo "Error: $RESPONSE"
            exit 1
          fi

          SESSION_NAME=$(echo "$RESPONSE" | jq -r '.name // empty')
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          STATE=$(echo "$RESPONSE" | jq -r '.state // empty')

          if [ -z "$SESSION_NAME" ] && [ -z "$SESSION_ID" ]; then
            echo "Error: $RESPONSE"
            exit 1
          fi

          echo "session_name=$SESSION_NAME" >> "$GITHUB_OUTPUT"
          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "Session created: $SESSION_NAME (state: $STATE)"

      - name: Notify session cap reached
        if: steps.create.outputs.quota_exhausted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⚠️ **Jules session cap reached (15/day).**\n\nNo review was created for this PR. Re-open or sync the PR tomorrow to trigger auto-review again.\n\n<!-- jules-quota-exhausted -->',
            });

      - name: Poll for completion
        if: steps.prepare.outputs.skip != 'true' && steps.create.outputs.quota_exhausted != 'true'
        id: poll
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          SESSION_NAME: ${{ steps.create.outputs.session_name }}
          SESSION_ID: ${{ steps.create.outputs.session_id }}
        run: |
          SESSION_RESOURCE="${SESSION_NAME:-sessions/${SESSION_ID}}"
          MAX_ATTEMPTS=60

          for i in $(seq 1 $MAX_ATTEMPTS); do
            sleep 15
            RESPONSE=$(curl -sS --fail-with-body --connect-timeout 10 --max-time 60 \
              "https://jules.googleapis.com/v1alpha/${SESSION_RESOURCE}?view=FULL" \
              -H "X-Goog-Api-Key: ${JULES_API_KEY}")
            STATE=$(echo "$RESPONSE" | jq -r '.state // "UNKNOWN"')

            if [ "$STATE" = "COMPLETED" ] || [ "$STATE" = "FAILED" ]; then
              echo "session_state=$STATE" >> "$GITHUB_OUTPUT"
              ACTS=$(curl -sS --fail-with-body --connect-timeout 10 --max-time 60 \
                "https://jules.googleapis.com/v1alpha/${SESSION_RESOURCE}/activities?pageSize=100" \
                -H "X-Goog-Api-Key: ${JULES_API_KEY}")
              echo "$ACTS" | jq -r '[(.activities // [])[] | select(.agentMessaged.agentMessage != null)][-1].agentMessaged.agentMessage // "Review unavailable"' > /tmp/jules-review-output.txt
              echo "Session finished ($STATE)"
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS — state: $STATE"
          done

          echo "session_state=TIMEOUT" >> "$GITHUB_OUTPUT"
          echo "Review timed out after $((MAX_ATTEMPTS * 15)) seconds." > /tmp/jules-review-output.txt

      - name: Post review and set commit status
        if: always() && steps.prepare.conclusion == 'success' && steps.create.outputs.quota_exhausted != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('/tmp/jules-review-output.txt', 'utf8');
            const prNumber = context.payload.pull_request.number;
            const headSha = '${{ steps.prepare.outputs.head_sha }}';
            const sessionState = '${{ steps.poll.outputs.session_state }}';

            // Split walkthrough from review before parsing
            const wtStart = '<!-- walkthrough_start -->';
            const wtEnd = '<!-- walkthrough_end -->';
            const reviewTextParts = reviewText.split(wtStart);
            const mainReview = reviewTextParts[0].trim();
            let walkthroughText = '';
            if (reviewTextParts.length > 1) {
              const afterStart = reviewTextParts[1];
              const endIdx = afterStart.indexOf(wtEnd);
              walkthroughText = endIdx !== -1
                ? afterStart.slice(0, endIdx).trim()
                : afterStart.trim();
            }

            // Parse verdict from structured output (review portion only)
            const verdictMatch = mainReview.match(/\[VERDICT\]:\s*(approve|comment|block)|<!--\s*verdict:\s*(approve|comment|block)\s*-->/i);
            const verdict = verdictMatch ? (verdictMatch[1] || verdictMatch[2]).toLowerCase() : null;

            // Determine commit status — fail closed
            let statusState = 'failure';
            let statusDesc = 'Review failed';
            if (sessionState === 'COMPLETED' && verdict === 'approve') {
              statusState = 'success';
              statusDesc = 'Approved';
            } else if (sessionState === 'COMPLETED' && verdict === 'comment') {
              statusState = 'success';
              statusDesc = 'Comments provided';
            } else if (sessionState === 'COMPLETED' && verdict === 'block') {
              statusState = 'failure';
              statusDesc = 'Blocking issues found';
            } else if (sessionState === 'FAILED') {
              statusState = 'failure';
              statusDesc = 'Jules session failed';
            } else if (sessionState === 'TIMEOUT') {
              statusState = 'failure';
              statusDesc = 'Review timed out';
            }

            // Set jules/review commit status
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: headSha,
                state: statusState,
                context: 'jules/review',
                description: statusDesc,
              });
            } catch (e) {
              core.warning(`Failed to set commit status: ${e.message}`);
            }

            // Parse per-line findings from Jules output
            const findingRegex = /<!--\s*FINDING\s+severity="([^"]+)"\s+file="([^"]+)"\s+line="?(\d+)"?(?:\s+reason="([^"]*)")?\s*-->/gi;
            const comments = [];
            let findingMatch;
            const seen = new Set();
            while ((findingMatch = findingRegex.exec(mainReview)) !== null) {
              const [, severity, file, line, reason] = findingMatch;
              const key = `${file}:${line}`;
              if (seen.has(key)) continue;
              seen.add(key);

              const heading = `### ${severity === 'critical' ? '🔴' : severity === 'high' ? '🟠' : severity === 'medium' ? '🟡' : '🟢'} ${severity.charAt(0).toUpperCase() + severity.slice(1)} - ${file}:${line}`;
              const startIdx = mainReview.indexOf(heading);
              const endIdx = mainReview.indexOf('<!-- FINDING', startIdx + 1);
              const findingBody = startIdx !== -1
                ? mainReview.slice(startIdx, endIdx !== -1 ? endIdx : undefined).trim()
                : '';

              comments.push({
                path: file,
                line: parseInt(line),
                body: findingBody || `${heading}\n\nSee review summary for details.`,
              });
            }

            // Post PR review (review portion only) with per-line comments
            const body = `<!-- jules-pr-reviewer -->\n\n${mainReview}`;

            try {
              const reviewParams = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: headSha,
                event: 'COMMENT',
                body,
              };
              if (comments.length > 0) {
                reviewParams.comments = comments;
              }
              await github.rest.pulls.createReview(reviewParams);
              core.info(`Review posted with ${comments.length} per-line comments`);
            } catch (e) {
              core.warning(`PR review failed, falling back to batch comment: ${e.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

            // Post walkthrough as separate issue comment if generated
            if (walkthroughText) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `<!-- jules-walkthrough -->\n\n${walkthroughText}`,
                });
                core.info('Walkthrough posted as issue comment');
              } catch (e) {
                core.warning(`Failed to post walkthrough: ${e.message}`);
              }
            }
