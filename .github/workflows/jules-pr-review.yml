name: Jules PR Review

# Produces a PR comment with structure:
#   ## Summary
#   ## Strengths
#   ## Findings
#     ### [BLOCKING] - file:line: description
#     ### [WARN] - file:line: description
#     ### [NIT] - file:line: description
#   ## Verdict
#   VERDICT: approve | comment | block
#
# fail_on: blocking means a BLOCKING verdict sets commit status to failure
# (blocks merge if jules/review is a required check)
#
# To add per-repo review rules, create .github/jules-review-rules.md
# in the repo — the action loads it automatically.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: jules-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'jules-') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Jules PR Review
        uses: sanjay3290/jules-pr-reviewer@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_drafts: true
          skip_forks: true
          bypass_label: jules-override
          status_context: jules/review
          fail_on: blocking
          timeout_minutes: 45
