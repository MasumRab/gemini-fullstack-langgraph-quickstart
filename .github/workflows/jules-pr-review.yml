name: Jules PR Review

# Custom reviewer: replaces community action with file-list-first diff strategy
# to avoid 80KB truncation. Reads existing PR comments for context. Sets
# jules/review commit status based on parsed verdict (block → failure).
#
# Output format expected from Jules:
#   ## Summary
#   ## Strengths
#   ## Findings
#     ### [BLOCKING] - path:line — desc
#     ### [WARN] - path:line — desc
#     ### [NIT] - path:line — desc
#   ## Verdict
#   VERDICT: approve | comment | block
#
# To skip review on this PR, add the label "jules-override".

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: jules-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !startsWith(github.event.pull_request.head.ref, 'jules-') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare review prompt
        id: prepare
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const baseRef = pr.base.ref;
            const headSha = pr.head.sha;
            const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;

            // Skip forks — no secret access
            if (isFork) {
              core.setOutput('skip', 'true');
              return;
            }

            // Check bypass label
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });
            if (labels.some(l => l.name === 'jules-override')) {
              core.setOutput('skip', 'true');
              return;
            }

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const fileSummary = files.map(f => ({
              path: f.filename, status: f.status,
              additions: f.additions, deletions: f.deletions,
            }));

            // Fetch existing comments
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });
            const { data: issueComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 20,
              direction: 'desc',
            });

            const skipMarkers = ['<!-- jules-pr-reviewer -->', '<!-- jules-auto-fix -->', '<!-- jules-resolve -->', '<!-- jules-walkthrough -->'];
            const priorFeedback = issueComments
              .filter(c => !skipMarkers.some(m => c.body?.includes(m)))
              .slice(0, 10)
              .map(c => {
                const who = c.user?.type === 'User' ? c.user.login : `[${c.user?.login}]`;
                return `${who}: ${c.body?.slice(0, 300)}`;
              })
              .join('\n\n');

            const priorReviews = reviewComments
              .slice(0, 10)
              .map(c => `- ${c.path}:${c.line} — ${c.body.slice(0, 300)}`)
              .join('\n');

            const prompt = [
              `## Code Review Request`,
              ``,
              `Repository: ${context.repo.owner}/${context.repo.repo}`,
              `Title: ${pr.title}`,
              `Target branch: ${baseRef}`,
              `Files changed: ${files.length} (${files.reduce((s, f) => s + f.additions + f.deletions, 0)} +/-)`,
              ``,
              `## Changed files (names only — no content)`,
              JSON.stringify(fileSummary, null, 2),
              ...(priorFeedback ? [``, `## Existing PR comments`, priorFeedback] : []),
              ...(priorReviews ? [``, `## Existing review comments`, priorReviews] : []),
              ``,
              `## Your task`,
              `Review the code changes using the file-list-first approach:`,
              `1. Review the file list above — identify relevant files`,
              `2. For each relevant file, run: git diff ${baseRef} -- <filepath>`,
              `3. Read existing PR/review comments above — build on prior context`,
              `4. Examine logic, security, edge cases, and consistency`,
              ``,
              `## Output format`,
              `When done, produce a review with exactly these sections:`,
              ``,
              `## Summary`,
              `(1-2 paragraphs — what this PR does and whether it's sound)`,
              ``,
              `## Strengths`,
              `- What's done well (point form)`,
              ``,
              `## Findings`,
              `### [BLOCKING] - path/file.ext:line — description`,
              `### [WARN] - path/file.ext:line — description`,
              `### [NIT] - path/file.ext:line — description`,
              ``,
              `## Verdict`,
              `VERDICT: approve | comment | block`,
              ``,
              `VERDICT must be exactly one of: approve, comment, block.`,
              `- approve: no issues, looks good`,
              `- comment: suggestions but OK to merge`,
              `- block: must be addressed before merge`,
            ].join('\n');

            const payload = {
              prompt,
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: { startingBranch: baseRef },
              },
              automationMode: 'AUTO_CREATE_PR',
            };

            const fs = require('fs');
            fs.writeFileSync('/tmp/jules-review-payload.json', JSON.stringify(payload));
            core.setOutput('head_sha', headSha);
            core.info(`Payload written for PR #${pr.number}`);

      - name: Skip (fork or bypass label)
        if: steps.prepare.outputs.skip == 'true'
        shell: bash
        run: echo "Skipped — fork PR or jules-override label present"

      - name: Create Jules session
        if: steps.prepare.outputs.skip != 'true'
        id: create
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          RESPONSE=$(curl -s -X POST "https://jules.googleapis.com/v1alpha/sessions" \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${JULES_API_KEY}" \
            -d @/tmp/jules-review-payload.json)

          SESSION_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          STATE=$(echo "$RESPONSE" | jq -r '.state // empty')

          if [ -z "$SESSION_ID" ]; then
            echo "Error: $RESPONSE"
            exit 1
          fi

          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "Session created: $SESSION_ID (state: $STATE)"

      - name: Poll for completion
        if: steps.prepare.outputs.skip != 'true'
        id: poll
        shell: bash
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          SESSION_ID="${{ steps.create.outputs.session_id }}"
          MAX_ATTEMPTS=60

          for i in $(seq 1 $MAX_ATTEMPTS); do
            sleep 15
            RESPONSE=$(curl -s "https://jules.googleapis.com/v1alpha/${SESSION_ID}?view=FULL" \
              -H "X-Goog-Api-Key: ${JULES_API_KEY}")
            STATE=$(echo "$RESPONSE" | jq -r '.state // "UNKNOWN"')

            if [ "$STATE" = "COMPLETED" ] || [ "$STATE" = "FAILED" ]; then
              echo "session_state=$STATE" >> "$GITHUB_OUTPUT"
              ACTS=$(curl -s "https://jules.googleapis.com/v1alpha/${SESSION_ID}/activities?pageSize=10" \
                -H "X-Goog-Api-Key: ${JULES_API_KEY}")
              echo "$ACTS" | jq -r '[.activities[] | select(.type == "agentMessaged")][-1].message // "Review unavailable"' > /tmp/jules-review-output.txt
              echo "Session finished ($STATE)"
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS — state: $STATE"
          done

          echo "session_state=TIMEOUT" >> "$GITHUB_OUTPUT"
          echo "Review timed out after $((MAX_ATTEMPTS * 15)) seconds." > /tmp/jules-review-output.txt

      - name: Post review and set commit status
        if: steps.prepare.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('/tmp/jules-review-output.txt', 'utf8');
            const prNumber = context.payload.pull_request.number;
            const headSha = '${{ steps.prepare.outputs.head_sha }}';
            const sessionState = '${{ steps.poll.outputs.session_state }}';

            // Parse verdict from structured output
            const verdictMatch = reviewText.match(/VERDICT:\s*(approve|comment|block)/i);
            const verdict = verdictMatch ? verdictMatch[1].toLowerCase() : null;

            // Determine commit status
            let statusState = 'success';
            let statusDesc = 'Review complete';
            if (sessionState === 'FAILED') {
              statusState = 'failure';
              statusDesc = 'Jules session failed';
            } else if (sessionState === 'TIMEOUT') {
              statusState = 'failure';
              statusDesc = 'Review timed out';
            } else if (verdict === 'block') {
              statusState = 'failure';
              statusDesc = 'Blocking issues found';
            }

            // Set jules/review commit status
            try {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: headSha,
                state: statusState,
                context: 'jules/review',
                description: statusDesc,
              });
            } catch (e) {
              core.warning(`Failed to set commit status: ${e.message}`);
            }

            // Post PR review as a pull request review (not issue comment)
            const body = `<!-- jules-pr-reviewer -->\n\n${reviewText}`;

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: headSha,
                event: 'COMMENT',
                body,
              });
              core.info('Review posted as PR review');
            } catch (e) {
              core.warning(`PR review failed, falling back to issue comment: ${e.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
