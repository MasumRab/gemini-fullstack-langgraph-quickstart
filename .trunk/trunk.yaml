version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
  - id: trunk
    ref: v1.10.2
    uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
  - go@1.21.0
  - node@22.16.0
  - python@3.14.4
lint:
  enabled:
  - actionlint@1.7.12
  - bandit@1.9.4
  - biome@2.5.4
  - black@26.5.1
  - checkov@3.3.8
  - git-diff-check
  - grype@0.116.0
  - hadolint@2.14.0
  - isort@8.0.1
  - markdownlint@0.49.1
  - osv-scanner@2.4.0
  - oxipng@10.1.1
  - pinact@4.1.0
  - prettier@3.9.5
  - ruff@0.15.22
  - shellcheck@0.11.0
  - shfmt@3.6.0
  - svgo@4.0.2
  - taplo@0.10.0
  - trufflehog@3.95.9
  - yamllint@1.38.0
  - semgrep@1.104.0
  - mypy@1.14.1
actions:
  disabled:
  - trunk-announce
  - trunk-check-pre-push
  - trunk-fmt-pre-commit
  enabled:
  - trunk-upgrade-available
