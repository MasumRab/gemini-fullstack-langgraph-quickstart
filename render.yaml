services:
  - type: web
    name: gemini-fullstack-agent
    runtime: python
    buildCommand: "./setup_env.sh"
    startCommand: "cd backend && export PYTHONPATH=$PYTHONPATH:$(pwd)/src && python -m uvicorn agent.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: NODE_VERSION
        value: 20.11.0
      - key: RENDER
        value: "true"
      - key: GEMMA_PROVIDER
        value: "google_genai"
      - key: GEMMA_MODEL_NAME
        value: "gemma-2-27b-it"
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: MODEL_PLANNING
        value: "gemma-2-27b-it"
      - key: MODEL_VALIDATION
        value: "gemma-2-27b-it"
      - key: MODEL_COMPRESSION
        value: "gemma-2-27b-it"
